<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnel Analyzer — MyPassportHub vs Competidores</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

  :root {
    --navy: #0D1B2A;
    --navy-mid: #1a2e42;
    --red: #E63946;
    --green: #2DC653;
    --orange: #D97706;
    --white: #FFFFFF;
    --off-white: #F8F9FA;
    --border: #E5E7EB;
    --text: #1a1a1a;
    --text-mid: #374151;
    --text-muted: #6B7280;
    --mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--navy);
    padding: 28px 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sidebar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
  }

  .sidebar-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sidebar-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    padding: 0 4px;
    margin-bottom: 4px;
  }

  .competitor-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 12px;
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .competitor-btn:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.2);
    color: white;
  }

  .competitor-btn.active {
    background: rgba(230,57,70,0.15);
    border-color: var(--red);
    color: white;
  }

  .competitor-btn.done {
    border-color: rgba(45,198,83,0.4);
    color: rgba(255,255,255,0.9);
  }

  .competitor-btn .pos-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    color: rgba(255,255,255,0.4);
    flex-shrink: 0;
  }

  .competitor-btn .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    display: none;
  }

  .competitor-btn.done .status-dot { display: block; }

  .analyze-btn {
    background: var(--red);
    border: none;
    border-radius: 10px;
    padding: 14px 16px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .analyze-btn:hover { background: #c62d39; transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .analyze-all-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 11px 16px;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .analyze-all-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: white;
  }

  /* ── MAIN ── */
  .main {
    padding: 40px 48px;
    overflow-y: auto;
    width: 100%;
    min-width: 0;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    text-align: center;
    gap: 16px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .empty-state h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-mid);
  }

  .empty-state p {
    font-size: 14px;
    max-width: 320px;
    line-height: 1.6;
  }

  /* ── LOADING ── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 20px;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-log {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    max-width: 400px;
    line-height: 2;
  }

  .loading-log .log-line {
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ── REPORT ── */
  .report { display: flex; flex-direction: column; gap: 0; width: 100%; }

  /* Cover */
  .report-cover {
    background: var(--navy);
    border-radius: 16px;
    padding: 48px 52px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
    width: 100%;
    box-sizing: border-box;
  }

  .report-cover::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,57,70,0.12) 0%, transparent 70%);
  }

  .cover-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
  }

  .cover-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 3.5vw, 42px);
    font-weight: 800;
    color: white;
    line-height: 1.1;
    margin-bottom: 16px;
    word-break: break-word;
  }

  .cover-title span { color: var(--red); }

  .cover-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    max-width: 540px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .cover-meta {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }

  .cover-meta-item {
    background: rgba(255,255,255,0.03);
    padding: 14px 18px;
  }

  .cover-meta-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 4px;
  }

  .cover-meta-value {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  /* Sections */
  .report-section {
    border-top: 1px solid var(--border);
    padding: 40px 0;
  }

  .section-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
  }

  .section-desc {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.65;
    max-width: 680px;
    margin-bottom: 28px;
  }

  /* Funnel steps viz */
  .funnel-compare {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .funnel-entity {
    margin-bottom: 20px;
  }

  .funnel-entity:last-child { margin-bottom: 0; }

  .funnel-entity-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .funnel-entity-name .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }

  .funnel-entity-name .dot.green { background: var(--green); }

  .funnel-entity-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .funnel-entity-steps {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .steps-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .step-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--off-white);
    border: 1px solid var(--border);
    color: var(--text-mid);
  }

  .step-pill.optional {
    background: rgba(217,119,6,0.06);
    border-color: rgba(217,119,6,0.2);
    color: var(--orange);
  }

  .step-pill.payment {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
    font-weight: 500;
  }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--red);
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-value.green { color: var(--green); }
  .kpi-value.navy { color: var(--navy); }

  .kpi-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Walkthrough steps */
  .walkthrough-steps { display: flex; flex-direction: column; gap: 16px; }

  .step-card {
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 0 12px 12px 0;
    padding: 20px 24px;
    position: relative;
  }

  .step-card.critico { border-left-color: var(--red); }
  .step-card.necesario { border-left-color: #1B4332; }
  .step-card.skippable { border-left-color: var(--orange); }
  .step-card.pago { border-left-color: var(--navy); }
  .step-card.precheckout { border-left-color: #6366f1; }

  .step-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
  }

  .step-card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }

  .step-card-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-right: 6px;
  }

  .severity-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .severity-badge.critico { background: rgba(230,57,70,0.1); color: var(--red); }
  .severity-badge.necesario { background: rgba(27,67,50,0.08); color: #1B4332; }
  .severity-badge.skippable { background: rgba(217,119,6,0.08); color: var(--orange); }
  .severity-badge.pago { background: rgba(13,27,42,0.08); color: var(--navy); }
  .severity-badge.precheckout { background: rgba(99,102,241,0.08); color: #6366f1; }

  .step-card-body {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .step-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .step-tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    background: var(--off-white);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
  }

  /* Dimension comparison */
  .dimension-block {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .dimension-header {
    padding: 16px 20px;
    background: var(--off-white);
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }

  .dimension-desc {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .dimension-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .dimension-col {
    padding: 18px 20px;
  }

  .dimension-col:first-child {
    border-right: 1px solid var(--border);
  }

  .dimension-col-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 10px;
  }

  .label-nosotros {
    background: rgba(230,57,70,0.08);
    color: var(--red);
  }

  .label-benchmark {
    background: rgba(45,198,83,0.08);
    color: #16a34a;
  }

  .dimension-col-text {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  .dimension-col-text ul {
    margin-top: 8px;
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .dimension-col-text li {
    font-size: 12px;
    padding-left: 14px;
    position: relative;
    color: var(--text-mid);
  }

  .dimension-col-text li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--text-muted);
    font-size: 10px;
  }

  /* Quick wins */
  .qw-list { display: flex; flex-direction: column; gap: 12px; }

  .qw-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
  }

  .qw-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--border);
    flex-shrink: 0;
    min-width: 28px;
  }

  .qw-card.priority-max .qw-num { color: var(--red); }

  .qw-content { flex: 1; }

  .qw-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .qw-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .qw-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qw-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .qw-tag.high { background: rgba(230,57,70,0.08); color: var(--red); }
  .qw-tag.medium { background: rgba(217,119,6,0.08); color: var(--orange); }
  .qw-tag.low { background: rgba(45,198,83,0.08); color: #16a34a; }

  /* Error */
  .error-state {
    background: rgba(230,57,70,0.05);
    border: 1px solid rgba(230,57,70,0.2);
    border-radius: 12px;
    padding: 24px;
    color: var(--red);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Export btn */
  .export-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 32px;
    width: 100%;
    box-sizing: border-box;
  }

  .export-bar-label {
    font-size: 13px;
    color: var(--text-mid);
  }

  .export-bar-label strong {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--text);
  }

  .export-btn {
    background: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .export-btn:hover { background: var(--navy-mid); }

  /* ── PROMPT OUTPUT ── */
  .prompt-output {
    background: var(--navy);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
  }

  .prompt-output-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 12px;
  }

  .prompt-output-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: white;
    margin-bottom: 8px;
  }

  .prompt-output-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .prompt-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
    cursor: text;
    user-select: all;
  }

  .copy-prompt-btn {
    background: var(--red);
    border: none;
    border-radius: 8px;
    padding: 11px 18px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .copy-prompt-btn:hover { background: #c62d39; }

  /* Monetization */
  .mono-compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .mono-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .mono-card-header {
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .mono-card-header.nosotros {
    background: rgba(230,57,70,0.06);
    color: var(--red);
    border-bottom: 1px solid rgba(230,57,70,0.12);
  }

  .mono-card-header.benchmark {
    background: rgba(45,198,83,0.06);
    color: #16a34a;
    border-bottom: 1px solid rgba(45,198,83,0.12);
  }

  .mono-card-body { padding: 16px; }

  .mono-card-body .total {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }

  .mono-card-body .total-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 16px;
    font-family: var(--mono);
  }

  .addon-list { display: flex; flex-direction: column; gap: 6px; }

  .addon-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-mid);
  }

  .addon-check {
    width: 16px; height: 16px;
    border-radius: 3px;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .addon-check.checked {
    background: rgba(230,57,70,0.1);
    color: var(--red);
  }

  .addon-check.unchecked {
    background: var(--off-white);
    border: 1px solid var(--border);
    color: transparent;
  }

<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

      <div class="sidebar-logo">Funnel Analyzer</div>

</div>

<script>
const COMPETITORS = [
  { name: 'unitedpassport.com', url: 'https://unitedpassport.com', pos: 1 },
  { name: 'staples.com', url: 'https://www.staples.com/passport', pos: 2 },
  { name: 'state.gov', url: 'https://travel.state.gov', pos: 3 },
  { name: 'usapassportonline.org', url: 'https://usapassportonline.org', pos: 4 },
  { name: 'uspassportandvisa.org', url: 'https://uspassportandvisa.org', pos: 5, done: true, cached: true },
  { name: 'hellogov.com', url: 'https://hellogov.com', pos: 6 },
  { name: 'passportvisarush.com', url: 'https://passportvisarush.com', pos: 7 },
  { name: 'govswift.com', url: 'https://govswift.com', pos: 8 },
  { name: 'ivs.us', url: 'https://ivs.us', pos: 9 },
  { name: 'clearme.com', url: 'https://clearme.com', pos: 10 },
  { name: 'entry.com', url: 'https://entry.com', pos: 11 },
  { name: 'fedex.com', url: 'https://www.fedex.com/passport', pos: 12 },
  { name: 'premier-passport.com', url: 'https://premier-passport.com', pos: 13 },
];

let selected = null;
let results = {};
let analyzing = false;

// Build sidebar
const list = document.getElementById('competitor-list');
COMPETITORS.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.className = 'competitor-btn' + (c.done ? ' done' : '');
  btn.id = `btn-${i}`;
  btn.innerHTML = `
    <span style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
      <span class="status-dot"></span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</span>
    </span>
    <span class="pos-badge">#${c.pos}</span>
  `;
  btn.onclick = () => selectCompetitor(i);
  list.appendChild(btn);
});

function selectCompetitor(i) {
  selected = i;
  document.querySelectorAll('.competitor-btn').forEach((b, j) => {
    b.classList.toggle('active', j === i);
  });
  document.getElementById('analyze-btn').disabled = false;

  if (results[i]) {
    renderReport(results[i], COMPETITORS[i]);
  } else {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">👆</div>
        <h2>${COMPETITORS[i].name}</h2>
        <p>Pulsa "Analizar seleccionado" para que Claude investigue el funnel de New Passport de este competidor.</p>
      </div>`;
  }
}

async function analyzeSelected() {
  if (selected === null || analyzing) return;
  await runAnalysis(selected);
}

async function analyzeAll() {
  if (analyzing) return;
  for (let i = 0; i < COMPETITORS.length; i++) {
    if (!results[i]) {
      selectCompetitor(i);
      await runAnalysis(i);
      await new Promise(r => setTimeout(r, 800));
    }
  }
}

async function runAnalysis(idx) {
  analyzing = true;
  const comp = COMPETITORS[idx];
  document.getElementById('analyze-btn').disabled = true;

  // Progress
  document.getElementById('progress-wrap').style.display = 'block';
  const total = COMPETITORS.length;
  const done = Object.keys(results).length;
  document.getElementById('progress-text').textContent = `Analizando ${done + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((done + 1) / total) * 100}%`;

  // Loading UI
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--text)">
        Analizando ${comp.name}
      </div>
      <div class="loading-log" id="log-area"></div>
    </div>`;

  const logLines = [
    `→ Buscando funnel New Passport en ${comp.url}`,
    `→ Investigando estructura de steps y campos`,
    `→ Analizando estrategia de add-ons y pricing`,
    `→ Comparando microcopy y trust signals vs mypassporthub`,
    `→ Generando análisis heurístico completo`,
    `→ Estructurando quick wins y recomendaciones`,
  ];

  let logEl = document.getElementById('log-area');
  for (let i = 0; i < logLines.length; i++) {
    await new Promise(r => setTimeout(r, 400));
    const line = document.createElement('div');
    line.className = 'log-line';
    line.style.animationDelay = '0s';
    line.textContent = logLines[i];
    logEl.appendChild(line);
  }

  try {
    const data = await callClaude(comp);
    results[idx] = data;

    // Mark done
    const btn = document.getElementById(`btn-${idx}`);
    btn.classList.add('done');
    btn.classList.remove('active');

    renderReport(data, comp);
  } catch (e) {
    main.innerHTML = `<div class="error-state">
      <strong>Error al analizar ${comp.name}</strong><br><br>
      ${e.message}<br><br>
      Esto puede ocurrir si la API tiene problemas de red o el análisis tardó demasiado. Inténtalo de nuevo.
    </div>`;
  }

  analyzing = false;
  document.getElementById('analyze-btn').disabled = false;
}

async function callClaude(comp) {
  const systemPrompt = `Eres un experto en UX y product management especializado en funnels de conversión para servicios de pasaporte de EE.UU. 
Analizas funnels heurísticamente, comparando estructuras, fricción de formulario, copy y estrategia de monetización.
Responde SOLO con JSON válido, sin markdown, sin explicaciones adicionales.`;

  const userPrompt = `Analiza el funnel de NEW PASSPORT (no renewal, no lost) de ${comp.name} (${comp.url}) comparándolo con mypassporthub.com.

Usa web search para investigar:
1. Cuántos pasos tiene el funnel de New Passport (landing → form steps → payment)
2. Qué campos piden en cada paso
3. Qué add-ons ofrecen y si están pre-marcados o no
4. Precio base y precio con add-ons
5. Trust signals (SSL, badges, garantías, soporte)
6. Microcopy y UX notable

DATOS FIJOS DE MYPASSPORTHUB (no cambiar):
- 8 pasos: Applicant Details > Contact Info > Travel Plans* > Emergency Contact* > Passport Details > Parents & Spouse > Review+Add-ons > Payment
- Base: $119, con add-ons pre-marcados: $193.85 (3 add-ons de $24.95 c/u)
- Add-ons pre-marcados: Passport Insurance $24.95, Priority Service $24.95, Passport Card $24.95
- SSN pedido en Step 1, precio no visible hasta Step 7
- Trust: 24/7 soporte visible en sidebar, garantía 30 días, disclaimer gubernamental en header

Responde con este JSON exacto:
{
  "competitor": {
    "name": "${comp.name}",
    "url": "${comp.url}",
    "adsPosition": ${comp.pos},
    "hypothesis": "string — hipótesis principal del análisis en 1 frase",
    "result": "Confirmada|Parcial|No confirmada",
    "steps": ["array de nombres de steps, ej: Landing, Form (1 página), Payment"],
    "optionalSteps": ["steps marcados como opcionales"],
    "paymentStep": "nombre del último paso",
    "basePrice": "string ej: $129.99",
    "totalWithAddons": "string ej: $174.99",
    "addons": [{"name": "string", "price": "string", "prechecked": true/false}],
    "formType": "wizard-multistep|single-page|two-page",
    "estimatedStepCount": 2,
    "loginRequired": false,
    "hasProgressIndicator": false,
    "ssnTiming": "step 1|after trust|post-payment|not requested|unknown",
    "priceFirstVisible": "landing|step 1|checkout|unknown",
    "hasTimer": false,
    "timerSeconds": null
  },
  "diagnosis": {
    "headline": "string — titular del diagnóstico tipo 'El mismo formulario en X pasos vs nuestros 8'",
    "body": "string — 2-3 frases de análisis del problema principal",
    "dropoffNote": "string — nota sobre implicación del drop-off compuesto"
  },
  "quickWins": [
    {
      "id": 1,
      "priority": "max|normal|strategic",
      "title": "string",
      "description": "string — 2-3 frases",
      "impact": "alto|medio|bajo",
      "effort": "bajo|medio|alto"
    }
  ],
  "walkthrough": {
    "competitor": [
      {
        "stepNum": 1,
        "name": "string",
        "severity": "entrada|critico|necesario|skippable|pago|precheckout",
        "description": "string — descripción de qué contiene y qué hace bien/mal",
        "tags": ["tag1", "tag2", "tag3"]
      }
    ]
  },
  "monetization": {
    "competitorStrategy": "string — descripción de la estrategia de add-ons del competidor",
    "competitorTicketMin": "string",
    "competitorTicketMax": "string",
    "competitorAdvantages": ["string array de ventajas del competidor"],
    "ourProblems": ["string array de nuestros problemas"],
    "commercialReading": "string — párrafo de lectura comercial estratégica"
  },
  "dimensions": {
    "funnelArchitecture": {
      "competitorText": "string",
      "competitorPoints": ["string array"]
    },
    "priceTransparency": {
      "competitorText": "string",
      "competitorPoints": ["string array"]
    },
    "microcopy": {
      "competitorText": "string",
      "competitorPoints": ["string array"]
    },
    "fieldFriction": {
      "competitorText": "string",
      "competitorPoints": ["string array"]
    },
    "trustSignals": {
      "competitorText": "string",
      "competitorPoints": ["string array"]
    }
  },
  "claudeDesignPrompt": "string — prompt completo listo para pegar en Claude Design para que genere el HTML visual del análisis, con todos los datos del análisis embebidos en el prompt"
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      system: systemPrompt,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: userPrompt }]
    })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`API error ${response.status}: ${err.slice(0, 200)}`);
  }

  const raw = await response.json();

  // Extract text from content blocks
  let text = '';
  for (const block of raw.content) {
    if (block.type === 'text') text += block.text;
  }

  // Parse JSON
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('No se encontró JSON en la respuesta. Respuesta raw: ' + text.slice(0, 300));

  return JSON.parse(jsonMatch[0]);
}

function copyPrompt(key) {
  const el = document.getElementById(`prompt-box-${key}`);
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.nextElementSibling;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar prompt para Claude Design →', 2000);
  });
}

function shareReport(btn) {
  // Find the report content (everything inside .report or the main report div)
  const reportEl = document.querySelector('.report') || document.getElementById('main-content');
  if (!reportEl) return;

  // Build a self-contained shareable HTML page
  const styles = Array.from(document.styleSheets)
    .map(s => { try { return Array.from(s.cssRules).map(r => r.cssText).join('\n'); } catch(e) { return ''; } })
    .join('\n');

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis Funnel — MyPassportHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, Helvetica, sans-serif; background: #F8F9FA; color: #1a1a1a; padding: 40px 48px; }
${styles}
.export-bar { display:none; }
</style>
</head>
<body>
${reportEl.innerHTML}
</body>
</html>`;

  // Create blob and download link
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'analisis-funnel-' + Date.now() + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Visual feedback
  const original = btn.textContent;
  btn.textContent = '✓ Descargado';
  setTimeout(() => btn.textContent = original, 2000);
}

</script>
</body>
</html>
